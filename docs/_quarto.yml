project:
  type: book
  output-dir: _book

lang: zh-TW

crossref:
  fig-title: 圖
  tbl-title: 表
  title-delim: " "
  labels: arabic

title: "Stack Overflow 社會網路分析 (SNA)"
author:
  - name: "B1143015 林宣佑"
  - name: "B1143021 林成瑋"
  - name: "B1143009 吳秉融"
  - name: "R1343012 鄭煒霖"
subtitle: |
  1142_人機介面與行為分析 期中報告
  指導教授：朱志明副教授
book:
  chapters:
    - index.qmd
    - 01_RESEARCH_MOTIVATION.qmd
    - 02_RESEARCH_METHODS.qmd
    - 03_RESULTS.qmd
    - 04_UNEXPECTED_OBSERVATIONS.qmd
    - 05_CONCLUSIONS_AND_RECOMMENDATIONS.qmd

format:
  pdf:
    pdf-engine: xelatex
    papersize: a4
    margin:
      x: 2.5cm
      y: 2.5cm
    linkcolor: "blue"
    urlcolor: "blue"
    colorlinks: true
    toc: true
    lot: true
    lof: true
    toc-title: "目錄"
    lof-title: "圖目錄"
    lot-title: "表目錄"
    toc-depth: 3
    number-sections: true
    number-depth: 3
    fig-align: center
    table-align: center
    tbl-cap-location: bottom
    fig-cap-location: bottom
    mainfont: "Noto Sans"
    sansfont: "Noto Sans"
    monofont: "Noto Sans Mono"
    CJKmainfont: "Noto Serif CJK TC"
    header-includes: |
      \usepackage{float}
      \floatplacement{table}{htbp}
      \usepackage{caption}
      \captionsetup[table]{labelsep=quad}
      \captionsetup[figure]{labelsep=quad}